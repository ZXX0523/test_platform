<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM系统操作中心</title>
    <script type="application/javascript" src="/static/js/dm_gubi_simplified.js"></script>
    <link type="text/css" rel="stylesheet" href="/static/css/ai_css.css">
</head>
<body>
    <!-- 页面标题 -->
    <div class="page-header">
        <h1 class="page-title">北冥系统操作中心</h1>
        <!-- <h1 style="color: #08A993;margin-left: 20px;">DM系统相关操作</h1> -->
        <!-- <p class="page-desc">高效管理学员数据与系统会话</p> -->
    </div>

    <!-- 环境选择区域 -->
    <div class="env-card">
        <div class="env-title">
            <span class="red">*</span>运行环境
        </div>
        <div role="radiogroup" class="el-radio-group bor" id="choose_env">
            <label role="radio" aria-checked="true" tabindex="0" class="el-radio-button el-radio-button--small is-active">
                <input type="radio" tabindex="-1" autocomplete="off" class="el-radio-button__orig-radio" name="choose_url"
                       value="test" checked>
                <span class="el-radio-button__inner">UAT环境</span>
            </label>
            <label role="radio" tabindex="-1" class="el-radio-button el-radio-button--small">
                <input type="radio" tabindex="-1" autocomplete="off" class="el-radio-button__orig-radio" name="choose_url"
                       value="pre">
                <span class="el-radio-button__inner">预发布环境</span>
            </label>
        </div>
    </div>

    <!-- 标签页 -->
    <div class="tabs">
        <div class="tab-item active" data-tab="tab1">更新学员开课日</div>
        <div class="tab-item" data-tab="tab2">更新学员完课状态</div>
        <div class="tab-item" data-tab="tab3">更新对弈数据</div>
        <div class="tab-item" data-tab="tab4">删除已约复盘数据</div>
        <div class="tab-item" data-tab="tab5">删除助力工具信息</div>
        <div class="tab-item" data-tab="tab6">删除会话数据</div>
        <div class="tab-item" data-tab="tab7">插入企微聊天数据</div>
        <div class="tab-item" data-tab="tab8">清理学情数据&任务</div>
    </div>

    <!-- 表单1：更新学员开课日（样式统一） -->

<div class="dm-gubi-page">
    <div class="form-panel active" id="tab1">
        <form id="submitorder" onsubmit="event.preventDefault(); UpdateUserInfo();">
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>咕比学员id</label>
                <div class="form-control">
                    <input id="userid" type="number" name="mobile" autocomplete="off" placeholder="请输入咕比学员id"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"><span class="red">*</span>开课日期</label>
                <div class="form-control">
                    <input id="opencourseday" name="opencourseday" autocomplete="off" placeholder="请输入开课日期（例：2024-01-01）"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"></label>
                <div class="form-control">
                    <button type="submit" class="el-button">确认更新开课信息</button>
                </div>
            </div>
        </form>
    </div>


    <!-- 表单2：第一节课完课状态（样式统一） -->
    <div class="form-panel" id="tab2">
        <form id="update_course_finished_status" onsubmit="event.preventDefault(); FinishedStatus()">
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>咕比学员id</label>
                <div class="form-control">
                    <input id="gubi_id" name="gubi_id" autocomplete="off" placeholder="请输入咕比学员id" type="number"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"><span class="red">*</span>第一节课是否完课</label>
                <div class="form-control">
                    <select id="finished_status" class="custom-select">
                        <option value="1">是</option>
                        <option value="0">否</option>
                    </select>
                </div>
                 <label class="form-label"><span class="red">*</span>第二节课是否完课</label>
                <div class="form-control">
                    <select id="finished_status_2" class="custom-select">
                        <option value="1">是</option>
                        <option value="0">否</option>
                    </select>
                </div>
                <label class="form-label"></label>
                <div class="form-control">
                    <button type="submit" class="el-button">确认更新</button>
                </div>
            </div>
        </form>
    </div>

    <!-- 表单3：更新对弈数据（样式统一） -->
    <div class="form-panel" id="tab3">
        <form id="update_go_pk_record" onsubmit="event.preventDefault(); PkRecord()">
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>咕比学员id</label>
                <div class="form-control">
                    <input id="user_id_pk" name="gubi_id" autocomplete="off" placeholder="请输入咕比学员id" type="number"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"><span class="red">*</span>赢的局数</label>
                <div class="form-control">
                    <input id="win_num" name="win_num" autocomplete="off" placeholder="赢的局数" type="number"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"><span class="red">*</span>输的局数</label>
                <div class="form-control">
                    <input id="lose_num" name="lose_num" autocomplete="off" placeholder="输的局数" type="number"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"></label>
                <div class="form-control">
                    <button type="submit" class="el-button">确认更新</button>
                </div>
            </div>
        </form>
    </div>

    <!-- 表单4：删除已约复盘数据（样式统一） -->
    <div class="form-panel" id="tab4">
        <form id="delete_review_record" onsubmit="event.preventDefault(); DeleteReviewRecord()">
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>咕比学员id</label>
                <div class="form-control">
                    <input id="review_gubi_id" name="gubi_id" autocomplete="off" placeholder="请输入咕比学员id" type="number"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"></label>
                <div class="form-control">
                    <button type="submit" class="el-button">确认删除</button>
                </div>
            </div>
        </form>
    </div>

    <!-- 表单5：删除助力工具信息（样式统一） -->
    <div class="form-panel" id="tab5">
        <form id="delete_help_util_userinfo" onsubmit="event.preventDefault(); DeleteHelpUtilUserinfo()">
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>咕比学员id</label>
                <div class="form-control">
                    <input id="help_gubi_id" name="gubi_id" autocomplete="off" placeholder="请输入咕比学员id" type="number"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"></label>
                <div class="form-control">
                    <button type="submit" class="el-button">确认删除</button>
                </div>
            </div>
        </form>
    </div>

    <!-- 表单6：删除DM系统会话（样式统一） -->
    <div class="form-panel" id="tab6">
        <form id="submit_deleta_conversation" onsubmit="event.preventDefault(); DeleteConversation()">
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>坐席的企微账号id</label>
                <div class="form-control">
                    <input id="seat_wechatid" name="seat_wechatid" autocomplete="off" placeholder="请输入AI坐席管理页面的账号ID"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"><span class="red">*</span>用户的企微昵称</label>
                <div class="form-control">
                    <input id="user_wechatname" name="user_wechatname" autocomplete="off" placeholder="请输入对话管理页面的微信昵称"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"><span class="red">*</span>业务线</label>
                <div class="form-control">
                    <select id="courseType" class="custom-select">
                        <option value="17">围棋</option>
                        <option value="15">社群运营</option>
                        <option value="16">益智</option>
                        <option value="28">派培优</option>
                    </select>
                </div>
                <label class="form-label"><span class="red">*</span>清理企微数据<span class="tooltip"><span class="tooltip-text">删除跟学员的绑定关系和企微会话存档的聊天记录</span></span></label>
                <div class="form-control">
                    <select id="clear_wechat_data" class="custom-select">
                        <option value="0">否</option>
                        <option value="1">是</option>
                    </select>
                </div>
                <label class="form-label"></label>
                <div class="form-control">
                    <button type="submit" class="el-button">确认删除</button>
                </div>
            </div>
        </form>
    </div><!-- 表单7：往企微会话存档插入聊天记录 -->
    <div class="form-panel" id="tab7">
        <form id="submit_deleta_conversation" onsubmit="event.preventDefault(); InsertChatData()">
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>坐席的企微账号id</label>
                <div class="form-control">
                    <input id="chat_seat_wechatid" name="seat_wechatid" autocomplete="off" placeholder="请输入AI坐席管理页面的账号ID"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"><span class="red">*</span>用户的微信id</label>
                <div class="form-control">
                    <input id="chat_user_wechatname" name="user_wechatname" autocomplete="off" placeholder="请输入对话管理页面的微信ID"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"><span class="red">*</span>业务线</label>
                <div class="form-control">
                    <select id="chat_courseType" class="custom-select">
                        <option value="AI">围棋</option>
                        <option value="XDT">小灯塔</option>
                        <option value="WANDOU">豌豆</option>
                    </select>
                </div>
                <label class="form-label"><span class="red">*</span>聊天数据<span class="tooltip"><span class="tooltip-text">数据是插入企微会话存档表(cw_chat_data)</span></span></label>
                <div class="form-control">
                    <textarea class="el-textarea__inner" id="chat_message_data_str" name="message_data_str" placeholder="请输入聊天数据" required>
[{
    "content":"老师你好呀",
    "role":"user"
},
{
    "content":"【图片】(当content字段包含【图片】则插入的聊天记录是图片类型)",
    "role":"assistant"
},
{
    "content":"好的好的呀",
    "role":"user"
}]
                    </textarea>
                </div>
                <label class="form-label"></label>
                <div class="form-control">
                    <button type="submit" class="el-button" id="insert-chat-data-btn">确认插入数据</button>
                </div>
            </div>
        </form>
    </div>

    <!-- 表单8：清理学习情况数据 -->
    <div class="form-panel" id="tab8">
        <form id="clear_learning_situation_data" onsubmit="event.preventDefault(); ClearLearningSituationData()">
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>大用户ID</label>
                <div class="form-control">
                    <input id="student_id" type="number" name="student_id" autocomplete="off" placeholder="请输入学员ID"
                           class="el-input__inner" required/>
                </div>
                <label class="form-label"><span class="red">*</span>节点类型</label>
                <div class="form-control">
                    <div class="custom-checkbox-group">
                        <label class="custom-checkbox">
                            <input type="checkbox" name="node_type" value="FIRST_LESSON">
                            <span>首课节点</span>
                        </label>
                        <label class="custom-checkbox">
                            <input type="checkbox" name="node_type" value="FIRST_SPECIAL">
                            <span>首专节点</span>
                        </label>
                        <label class="custom-checkbox">
                            <input type="checkbox" name="node_type" value="FIRST_MONTH">
                            <span>首月节点</span>
                        </label>
                    </div>
                </div>
                <label class="form-label"></label>
                <div class="form-control">
                    <button type="submit" class="el-button">确认清理数据</button>
                </div>
            </div>
        </form>
    </div>
</div>

    <!-- 操作结果区域 -->
    <div class="result-section">
        <div class="result-header">
            <h2 class="result-title">操作结果</h2>
            <div class="result-actions">
                <!-- <span class="action-btn" id="clear-result">

                    复制
                </span> -->
            </div>
        </div>
        <div id="result"></div>
    </div>

    <script>
        // 标签页切换逻辑
        const tabItems = document.querySelectorAll('.tab-item');
        const formPanels = document.querySelectorAll('.form-panel');

        tabItems.forEach(tab => {
            tab.addEventListener('click', () => {
                // 移除所有激活状态
                tabItems.forEach(item => item.classList.remove('active'));
                formPanels.forEach(panel => panel.classList.remove('active'));
                
                // 添加当前激活状态
                tab.classList.add('active');
                const targetTab = tab.getAttribute('data-tab');
                document.getElementById(targetTab).classList.add('active');
            });
        });

        // 运行环境单选按钮选中效果
        const envRadios = document.querySelectorAll('.el-radio-button');
        envRadios.forEach(radio => {
            radio.addEventListener('click', () => {
                envRadios.forEach(r => r.classList.remove('is-active'));
                radio.classList.add('is-active');
                // 同步原生radio的选中状态
                const input = radio.querySelector('.el-radio-button__orig-radio');
                input.checked = true;
            });
        });

</body>
</html>
