<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学员消课</title>
    <script type="application/javascript" src="/static/js/hualalaConsumeHours.js"></script>
    <!-- 引用汇总后的CSS文件 -->
    <link type="text/css" rel="stylesheet" href="/static/css/ai_css.css">
</head>
<body>
    <!-- 页面标题 -->
    <div class="page-header">
        <h1 class="page-title">画啦啦学员消课</h1>
    </div>

    <form id="submitorder" onsubmit="event.preventDefault(); ConsumeHours();">
        <!-- 表单面板：添加consume-hours-panel类，强制显示 -->
        <div class="form-panel consume-hours-panel">
            <!-- 学员ID输入行 -->
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>请输入学员ID</label>
                <div class="form-control">
                    <input id="user_id" type="number" name="user_id" autocomplete="off" 
                           placeholder="学员ID" class="el-input__inner" required>
                </div>
            </div>

            <!-- 环境选择行 -->
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>选择学员的环境</label>
                <div class="form-control">
                    <div role="radiogroup" class="el-radio-group bor" id="choose_env">
                        <label role="radio" aria-checked="true" tabindex="0" class="el-radio-button el-radio-button--small is-active">
                            <input type="radio" tabindex="-1" autocomplete="off" class="el-radio-button__orig-radio" 
                                   name="choose_url" value="test" checked>
                            <span class="el-radio-button__inner">UAT环境</span>
                        </label>
                        <label role="radio" tabindex="-1" class="el-radio-button el-radio-button--small">
                            <input type="radio" tabindex="-1" autocomplete="off" class="el-radio-button__orig-radio" 
                                   name="choose_url" value="pre">
                            <span class="el-radio-button__inner">预发布环境</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 课程类型选择行 -->
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>课程类型</label>
                <div class="form-control">
                    <div role="radiogroup" class="el-radio-group bor">
                        <label role="radio" tabindex="-1" class="el-radio-button el-radio-button--small is-active">
                            <input id="course1" type="radio" tabindex="-1" autocomplete="off" class="el-radio-button__orig-radio" 
                                   value="0" name="choose_sku" checked>
                            <span class="el-radio-button__inner">正式课</span>
                        </label>
                        <label role="radio" tabindex="-1" class="el-radio-button el-radio-button--small">
                            <input id="course2" type="radio" tabindex="-1" autocomplete="off" class="el-radio-button__orig-radio" 
                                   value="8" name="choose_sku">
                            <span class="el-radio-button__inner">系列专题课</span>
                        </label>
                        <label role="radio" tabindex="-1" class="el-radio-button el-radio-button--small">
                            <input id="course3" type="radio" tabindex="-1" autocomplete="off" class="el-radio-button__orig-radio" 
                                   value="11" name="choose_sku">
                            <span class="el-radio-button__inner">活动课</span>
                        </label>
                        <label role="radio" tabindex="-1" class="el-radio-button el-radio-button--small">
                            <input id="course4" type="radio" tabindex="-1" autocomplete="off" class="el-radio-button__orig-radio" 
                                   value="10" name="choose_sku">
                            <span class="el-radio-button__inner">名师拓展课</span>
                        </label>
                        <label role="radio" tabindex="-1" class="el-radio-button el-radio-button--small">
                            <input id="course5" type="radio" tabindex="-1" autocomplete="off" class="el-radio-button__orig-radio" 
                                   value="12" name="choose_sku">
                            <span class="el-radio-button__inner">强化课</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 提交按钮行 -->
            <div class="form-grid">
                <label class="form-label"></label>
                <div class="form-control">
                    <button type="submit" value="确认消课" class="el-button">
                        <span>确认消课</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 结果展示区域 -->
        <div class="result-section">
            <div class="result-header">
                <h2 class="result-title">请求结果</h2>
            </div>
            <div id="result"></div>
        </div>
    </form>

    <script>
        // 环境/课程类型单选按钮交互
        const radioButtons = document.querySelectorAll('.el-radio-button');
        radioButtons.forEach(radio => {
            radio.addEventListener('click', () => {
                const parentGroup = radio.closest('.el-radio-group');
                parentGroup.querySelectorAll('.el-radio-button').forEach(r => {
                    r.classList.remove('is-active');
                });
                radio.classList.add('is-active');
                const input = radio.querySelector('.el-radio-button__orig-radio');
                input.checked = true;
            });
        });
    </script>
</body>
</html>
