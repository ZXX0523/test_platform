<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画啦啦学员正式课导单</title>
    <!-- 原有CSS文件 -->
     
    <link type="text/css" rel="stylesheet" href="/static/css/ai_css.css">
    <!-- 新增CSS样式（不修改原有CSS） -->
    <style>
        /* ========== 新增样式 - 不修改原有CSS ========== */
        
    </style>
</head>
<body>
    <!-- 页面标题 -->
    <div class="page-header">
        <h1 class="page-title">画啦啦学员正式课导单</h1>
        <!-- <div class="page-desc">选择套餐信息，快速生成导单</div> -->
    </div>

    <!-- 表单区域 -->
    <div class="form-panel">
        <!-- 学员手机号输入 -->
        <div class="form-grid">
            <label class="form-label"><span class="red">*</span>输入学员手机号</label>
            <div class="form-control">
                <input id="mobile" type="number" name="mobile" autocomplete="off" 
                       placeholder="学员手机号" class="el-input__inner">
            </div>
        </div>

        <!-- 环境选择 -->
        <div class="form-grid">
            <label class="form-label"><span class="red">*</span>选择学员的环境</label>
            <div class="form-control">
                <div class="el-radio-group" id="choose_env">
                    <label class="el-radio-button is-active">
                        <input type="radio" name="choose_url" value="test" checked class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">UAT环境</span>
                    </label>
                    <label class="el-radio-button">
                        <input type="radio" name="choose_url" value="pre" class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">预发布环境</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 套餐类型 -->
        <div class="form-grid">
            <label class="form-label"><span class="red">*</span>套餐类型</label>
            <div class="form-control">
                <div class="el-radio-group" id="choose_package_type">
                    <label class="el-radio-button is-active">
                        <input type="radio" name="package_type" value="apply" checked class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">首报全款</span>
                    </label>
                    <label class="el-radio-button">
                        <input type="radio" name="package_type" value="renew" class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">续费全款</span>
                    </label>
                </div>
            </div>
        </div>

        <!-- 套餐期长 -->
        <div class="form-grid">
            <label class="form-label"><span class="red">*</span>套餐期长</label>
            <div class="form-control">
                <div class="el-radio-group" id="choose_sku">
                    <label class="el-radio-button el-radio-button--small is-active">
                        <input type="radio" name="choose_sku" value="1955,1963,1826" checked class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">1课时</span>
                    </label>
                    <label class="el-radio-button el-radio-button--small">
                        <input type="radio" name="choose_sku" value="2395,2394" class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">4课时</span>
                    </label>
                    <label class="el-radio-button el-radio-button--small">
                        <input type="radio" name="choose_sku" value="313,1989" class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">12课时</span>
                    </label>
                    <label class="el-radio-button el-radio-button--small">
                        <input type="radio" name="choose_sku" value="201,206,207,2118" class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">24课时</span>
                    </label>
                    <label class="el-radio-button el-radio-button--small">
                        <input type="radio" name="choose_sku" value="202,209" class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">48课时</span>
                    </label>
                    <label class="el-radio-button el-radio-button--small">
                        <input type="radio" name="choose_sku" value="301,302,303,304" class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">72课时</span>
                    </label>
                    <label class="el-radio-button el-radio-button--small">
                        <input type="radio" name="choose_sku" value="309,310,311,312" class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">144课时</span>
                    </label>
                    <label class="el-radio-button el-radio-button--small">
                        <input type="radio" name="choose_sku" value="appoint" class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">指定套餐id</span>
                    </label>
                </div>
                <div id="appoint_skuid" class="appoint-sku-wrapper" style="display: none;">
                    <input id="searchInput" type="number" placeholder="套餐id" 
                           value="1955" class="el-input__inner" style="width: 120px;">
                </div>
            </div>
        </div>

        <!-- 套餐含画具 -->
        <div class="form-grid">
            <label class="form-label"><span class="red">*</span>套餐含画具</label>
            <div class="form-control">
                <div class="el-radio-group" id="PaintingTools">
                    <label class="el-radio-button el-radio-button--small">
                        <input type="radio" name="PaintingTools" value="1" class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">含画具</span>
                    </label>
                    <label class="el-radio-button el-radio-button--small is-active">
                        <input type="radio" name="PaintingTools" value="0" checked class="el-radio-button__orig-radio">
                        <span class="el-radio-button__inner">不含画具</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- 套餐列表表格 -->
    <div class="table-wrapper">
        <table class="data-table">
            <thead>
                <tr>
                    <th>套餐ID</th>
                    <th>套餐名称</th>
                    <th>套餐类型</th>
                    <th>付费课时</th>
                    <th>赠送课时</th>
                    <th>是否含优惠券</th>
                    <th>含画具</th>
                    <th>原价</th>
                    <th>实付金额</th>
                    <th>活动配置ID</th>
                    <th>活动名称</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="applystandardcourse">
                <tr><td colspan="12" class="empty-data">暂无数据</td></tr>
            </tbody>
        </table>
    </div>

    <!-- 结果区域 -->
    <div class="result-section">
        <div class="result-header">
            <h2 class="result-title">请求结果</h2>
        </div>
        <div id="result">等待操作...</div>
    </div>

    <!-- 全局加载遮罩 - 放在最上层 -->
    <div id="globalLoading" class="global-loading-mask" style="display: none;">
        <div class="global-loading-content">
            <div class="global-loading-spinner"></div>
            <span>请稍候...</span>
        </div>
    </div>

    <script type="application/javascript" src="/static/js/hualalaImportOrder.js"></script>
</body>
</html>
