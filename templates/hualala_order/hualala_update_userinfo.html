<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单退款123123</title>
    <script type="application/javascript" src="/static/js/hualalaUpdateUserInfo.js"></script>
    <link type="text/css" rel="stylesheet" href="/static/css/ai_css.css">
</head>
<body>
    <!-- 页面标题 -->
    <div class="page-header">
        <h1 class="page-title">画啦啦修改学员基础信息</h1>
    </div>

    <form id="submitorder" onsubmit="event.preventDefault(); UpdateUserInfo();">
        <!-- 表单面板：统一样式 -->
        <div class="form-panel">
            <!-- 学员手机号输入 -->
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>输入学员手机号</label>
                <div class="form-control">
                    <input id="mobile" type="number" name="mobile" autocomplete="off" placeholder="学员手机号"
                           class="el-input__inner" required/>
                </div>
            </div>

            <!-- 环境选择 -->
            <div class="form-grid">
                <label class="form-label"><span class="red">*</span>选择学员的环境</label>
                <div class="form-control">
                    <div role="radiogroup" class="el-radio-group bor" id="choose_env">
                        <label role="radio" aria-checked="true" tabindex="0"
                               class="el-radio-button el-radio-button--small is-active">
                            <input type="radio" tabindex="-1" autocomplete="off" class="el-radio-button__orig-radio" name="choose_url"
                                   value="test" checked>
                            <span class="el-radio-button__inner">UAT环境</span>
                        </label>
                        <label role="radio" tabindex="-1" class="el-radio-button el-radio-button--small">
                            <input type="radio" tabindex="-1" autocomplete="off" class="el-radio-button__orig-radio" name="choose_url"
                                   value="pre">
                            <span class="el-radio-button__inner">预发布环境</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- 提交按钮 -->
            <div class="form-grid">
                <label class="form-label"></label>
                <div class="form-control">
                    <button type="submit" class="el-button el-button--success el-button--small">
                        <span>确认更新</span>
                    </button>
                    <span style="margin-left: 10px;font-size: 12px;color: grey;">*适用于学员首报审核时，跳过学员档案必填资料填写</span>
                </div>
            </div>
        </div>

        <!-- 结果展示区域 -->
        <div class="result-section">
            <div class="result-header">
                <h2 class="result-title">请求结果</h2>
            </div>
            <div id="result" style="width: 500px;height:200px;"></div>
        </div>
    </form>

    <script>
        // 环境单选按钮交互（与代码2保持一致）
        const radioButtons = document.querySelectorAll('.el-radio-button');
        radioButtons.forEach(radio => {
            radio.addEventListener('click', () => {
                const parentGroup = radio.closest('.el-radio-group');
                parentGroup.querySelectorAll('.el-radio-button').forEach(r => {
                    r.classList.remove('is-active');
                });
                radio.classList.add('is-active');
                const input = radio.querySelector('.el-radio-button__orig-radio');
                input.checked = true;
            });
        });
    </script>
</body>
</html>
