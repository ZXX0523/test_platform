<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务系统-测试工具集成平台</title>
    <link rel="stylesheet" href="https://cdn.staticfile.org/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://cdn.staticfile.org/jquery/2.1.1/jquery.min.js"></script>
    <script src="https://cdn.staticfile.org/twitter-bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <style>
        body {
            background-color: #F5F5F5;
            margin: 0;
            padding: 20px;
            font-family: "Microsoft Yahei", "PingFang SC", sans-serif;
        }

        .userWrap {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            /* gap: 20px; */
            min-height: calc(100vh - 40px);
        }

        /* 左侧菜单 */
        .userMenu {
            width: 200px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            padding: 15px 0;
        }

        .userMenu .nav-pills > li {
            margin: 5px 10px;
        }

        .userMenu .nav-pills > li > a {
            padding: 10px 15px;
            border-radius: 6px;
            color: #555;
            font-size: 14px;
            transition: all 0.2s;
        }

        .userMenu .nav-pills > li > a .glyphicon {
            margin-right: 8px;
            color: #08A993;
        }

        .userMenu .nav-pills > li:hover > a {
            background-color: #eefcfa;
            color: #08A993;
        }

        .userMenu .nav-pills > li.active > a {
            background-color: #08A993;
            color: #fff;
        }

        .userMenu .nav-pills > li.active > a .glyphicon {
            color: #fff;
        }

        /* 右侧内容区 */
        #content {
            flex: 1;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        #menuFrame {
            width: 100%;
            height: calc(100vh - 40px);
            border: none;
        }

        /* 简单响应式 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .userWrap {
                flex-direction: column;
            }
            
            .userMenu {
                width: 100%;
            }
            
            .userMenu .nav-pills {
                display: flex;
                flex-wrap: wrap;
            }
            
            .userMenu .nav-pills > li {
                flex: 1;
                min-width: 120px;
            }
            
            #menuFrame {
                height: 500px;
            }
        }
    </style>
</head>

<body>
    <div class="userWrap">
        <!-- 左侧菜单 -->
        <div class="userMenu">
            <ul class="nav nav-pills nav-stacked">
                <li>
                    <a href="{{ url_for('dm_gubi.UpdateUserOpenclasstimeHtml') }}" target="iframe_a">
                       北冥系统
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('hualala_update_userinfo.hualalaUpdateUserinfoHtml') }}" target="iframe_a">
                        画啦啦修改学员信息
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('hualala_import_order.hualalaImportOrderHtml') }}" target="iframe_a">
                        画啦啦学员购课
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('hualala_consume_hours.hualalaConsumeHoursHtml') }}" target="iframe_a">
                       画啦啦学员消课
                    </a>
                </li>
            </ul>
        </div>

        <!-- 右侧内容区 -->
        <div id="content">
            <iframe id="menuFrame" src="{{ url_for('dm_gubi.UpdateUserOpenclasstimeHtml') }}" width="100%" frameborder="0" scrolling="yes" name="iframe_a"></iframe>
        </div>
    </div>

    <script>
        // 菜单高亮
        $(document).ready(function() {
            $('.userMenu .nav-pills li a').on('click', function() {
                $('.userMenu .nav-pills li').removeClass('active');
                $(this).parent('li').addClass('active');
            });
            
            // 默认高亮第一个
            $('.userMenu .nav-pills li:first').addClass('active');
        });
    </script>
</body>

</html>
